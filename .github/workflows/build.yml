name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

# منع تشغيل builds متتالة (يمنع startup_failure)
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'
        cache-disabled: true

    - name: Restore debug keystore from history
      run: |
        git show ae59b2e:app/yz-manga-debug.keystore > app/yz-manga-debug.keystore 2>/dev/null || true
        ls -la app/yz-manga-debug.keystore 2>/dev/null && echo "✅ keystore restored" || echo "⚠️ using default"

    - name: Prepare release keystore
      run: |
        if [ -n "${{ secrets.RELEASE_KEYSTORE }}" ]; then
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > app/release.keystore
          echo "✅ release keystore decoded"
        else
          echo "⚠️ using debug keystore for release"
          cp app/yz-manga-debug.keystore app/release.keystore 2>/dev/null || true
        fi

    - name: Build Debug APK
      run: gradle assembleDebug --stacktrace

    - name: Build Release APK
      run: gradle assembleRelease --stacktrace
      env:
        KEYSTORE_FILE: app/release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD || 'android' }}
        KEY_ALIAS: androiddebugkey
        KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || 'android' }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: manga-apk-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: manga-apk-release
        path: app/build/outputs/apk/release/app-release*.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Manga App Build ${{ github.run_number }}
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Cleanup
      if: always()
      run: rm -f app/release.keystore app/yz-manga-debug.keystore
