name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.9'

    - name: Print Debug SHA-1
      run: |
        echo "=========================================="
        echo "=== DEBUG SHA-1 FINGERPRINT: ==="
        echo "=========================================="
        keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep "SHA1:" || echo "No debug keystore found"
        echo "=========================================="
        echo "Add this SHA-1 to Firebase Console → Project Settings → Your apps → Android app → SHA-1"
        echo "=========================================="

    - name: Build APK
      run: gradle assembleDebug --stacktrace 2>&1 | tee build-output.log

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: manga-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build-output.log
